{% extends "base.html" %}
{% block title %}{{ t.nav_inbox }} — Anrufwerker{% endblock %}

{% block content %}
<section class="hero">
  <div>
    <div class="eyebrow">{{ t.inbox_eyebrow }}</div>
    <h1>{{ t.inbox_title }}</h1>
    <p>{{ t.inbox_intro }}</p>
  </div>
</section>

<div id="leads-content"
     hx-ext="sse"
     sse-connect="/sse/anfragen"
     hx-get="/partial/anfragen{% if active_filter or query %}?{% if active_filter %}status={{ active_filter|urlencode }}{% endif %}{% if active_filter and query %}&{% endif %}{% if query %}q={{ query|urlencode }}{% endif %}{% endif %}"
     hx-trigger="sse:refresh"
     hx-target="#leads-content"
     hx-swap="outerHTML">
  {% include "partial_anfragen.html" %}
</div>
{% endblock %}
